<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>May Challenge · History</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --green: #1D9E75; --green-2: #E1F5EE; --green-3: #0a5c44;
    --bg: #0e0e0c; --surface: #161614; --surface-2: #1e1e1b;
    --text: #f0f0ee; --text-2: #8a8a84; --text-3: #4a4a46;
    --border: rgba(255,255,255,0.07);
    --red: #e05555; --yellow: #e0a855; --blue: #5580e0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .page { max-width: 900px; margin: 0 auto; padding: 32px 20px 60px; }

  /* HEADER */
  .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 36px; flex-wrap: wrap; gap: 12px; }
  .header-left h1 { font-family: 'Syne', sans-serif; font-size: clamp(28px, 5vw, 42px); font-weight: 800; letter-spacing: -1.5px; line-height: 1; color: var(--text); }
  .header-left h1 span { color: var(--green); }
  .header-left p { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-2); margin-top: 6px; letter-spacing: 0.05em; }

  /* NAV */
  .nav { display: flex; gap: 12px; margin-bottom: 28px; }
  .nav a { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-3); text-decoration: none; letter-spacing: 0.05em; padding: 6px 12px; border: 0.5px solid var(--border); border-radius: 999px; transition: all 0.15s; }
  .nav a:hover { color: var(--text); border-color: var(--text-3); }
  .nav a.active { color: var(--green); border-color: var(--green); }

  /* HERO */
  .hero { background: var(--surface); border: 0.5px solid var(--border); border-radius: 20px; padding: 28px 28px 24px; margin-bottom: 16px; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--green), transparent); }
  .hero-top { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .hero-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; flex-shrink: 0; }
  .hero-name { font-family: 'Syne', sans-serif; font-size: clamp(28px, 5vw, 40px); font-weight: 800; letter-spacing: -1.5px; line-height: 1; color: var(--text); }
  .hero-nums { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 20px; }
  .hero-current { font-family: 'Syne', sans-serif; font-size: clamp(48px, 10vw, 72px); font-weight: 800; letter-spacing: -3px; line-height: 1; color: var(--text); }
  .hero-unit { font-size: 14px; color: var(--text-2); margin-bottom: 10px; margin-left: 4px; }
  .hero-slash { font-family: 'DM Mono', monospace; font-size: 20px; color: var(--text-3); margin-bottom: 10px; }
  .hero-goal { font-family: 'DM Mono', monospace; font-size: 18px; color: var(--text-2); margin-bottom: 10px; }
  .hero-bar-bg { height: 6px; background: var(--surface-2); border-radius: 999px; overflow: hidden; margin-bottom: 20px; }
  .hero-bar-fill { height: 6px; background: var(--green); border-radius: 999px; transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .hero-meta { display: flex; gap: 24px; flex-wrap: wrap; }
  .hero-meta-item { display: flex; flex-direction: column; gap: 2px; }
  .hero-meta-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase; }
  .hero-meta-val { font-family: 'DM Mono', monospace; font-size: 16px; color: var(--text); font-weight: 500; }
  .hero-meta-val.green { color: var(--green); }

  /* CARDS */
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
  .card-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 16px; }

  /* STATS ROW */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 14px; padding: 16px 18px; }
  .stat-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .stat-val { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -1px; color: var(--text); line-height: 1; }
  .stat-sub { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-3); margin-top: 4px; }

  /* WORKOUT LIST */
  .workout-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .workout-row:last-child { border-bottom: none; padding-bottom: 0; }
  .workout-icon { font-size: 20px; width: 32px; flex-shrink: 0; text-align: center; }
  .workout-info { flex: 1; min-width: 0; }
  .workout-activity { font-size: 14px; font-weight: 500; color: var(--text); }
  .workout-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .workout-mins { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--green); flex-shrink: 0; }

  /* ACTIVITY BREAKDOWN */
  .activity-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid var(--border); }
  .activity-row:last-child { border-bottom: none; }
  .activity-icon { font-size: 18px; width: 28px; flex-shrink: 0; }
  .activity-name { font-size: 13px; color: var(--text); flex: 1; }
  .activity-bar-wrap { width: 80px; }
  .activity-bar-bg { height: 3px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
  .activity-bar-fill { height: 3px; background: var(--green); border-radius: 999px; }
  .activity-hrs { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-2); flex-shrink: 0; width: 38px; text-align: right; }

  /* TWO COL */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  @media(max-width: 600px) { .two-col { grid-template-columns: 1fr; } }

  /* LOADING */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 12px; }
  .loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-3); }

  .error-state { text-align: center; padding: 60px 20px; }
  .error-state p { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-3); }
  .error-state a { color: var(--green); text-decoration: none; }

  /* DELETE BUTTON */
  .workout-delete { background: transparent; border: none; color: var(--text-3); font-size: 16px; line-height: 1; padding: 6px 8px; margin-left: 4px; cursor: pointer; border-radius: 6px; transition: all 0.15s; flex-shrink: 0; font-family: inherit; }
  .workout-delete:hover { color: var(--red); background: var(--surface-2); }
  .workout-delete:disabled { opacity: 0.4; cursor: not-allowed; }

  /* CONFIRM MODAL */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; padding: 20px; }
  .modal-backdrop.show { opacity: 1; pointer-events: auto; }
  .modal { background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px; padding: 24px; max-width: 360px; width: 100%; transform: scale(0.95); transition: transform 0.2s; }
  .modal-backdrop.show .modal { transform: scale(1); }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); margin-bottom: 8px; }
  .modal-body { font-size: 14px; color: var(--text-2); line-height: 1.5; margin-bottom: 20px; }
  .modal-body strong { color: var(--text); font-weight: 600; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn { padding: 10px 16px; font-size: 14px; font-weight: 500; border-radius: 10px; border: 0.5px solid var(--border); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .modal-btn.cancel { background: transparent; color: var(--text); }
  .modal-btn.cancel:hover { background: var(--surface-2); }
  .modal-btn.confirm { background: var(--red); color: white; border-color: var(--red); }
  .modal-btn.confirm:hover { opacity: 0.9; }
  .modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: var(--bg); font-size: 14px; font-weight: 500; padding: 12px 20px; border-radius: 999px; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap; z-index: 200; font-family: inherit; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* MASCOT */
  .mascot-section { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 24px 20px 16px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 20px; position: relative; overflow: hidden; margin-bottom: 16px; }
  .mascot-section::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--green), transparent); }
  .mascot-wrap { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; }
  .mascot-wrap svg { overflow: visible; }
  .crown-overlay { position: absolute; top: 0px; left: 50%; transform: translateX(-50%); pointer-events: none; opacity: 0; transition: opacity 0.5s; z-index: 2; }
  .crown-overlay.show { opacity: 1; animation: crown-bounce 2s ease-in-out infinite; }
  @keyframes crown-bounce { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-6px)} }

  /* DOG ANIMATIONS */
  .dog-idle { animation: dog-breathe 2.5s ease-in-out infinite; transform-origin: center bottom; }
  @keyframes dog-breathe { 0%,100%{transform:scaleY(1) translateY(0)} 50%{transform:scaleY(1.02) translateY(-2px)} }
  .dog-sleep { animation: dog-snore 3s ease-in-out infinite; transform-origin: center bottom; }
  @keyframes dog-snore { 0%,100%{transform:scaleY(1) scaleX(1)} 50%{transform:scaleY(0.96) scaleX(1.03)} }
  .dog-love { animation: dog-bounce 0.5s ease-in-out infinite alternate; transform-origin: center bottom; }
  @keyframes dog-bounce { 0%{transform:translateY(0) rotate(-2deg)} 100%{transform:translateY(-8px) rotate(2deg)} }
  .dog-tail { animation: tail-wag 0.4s ease-in-out infinite alternate; transform-origin: left center; }
  @keyframes tail-wag { 0%{transform:rotate(-15deg)} 100%{transform:rotate(15deg)} }
  .dog-tail-sleep { animation: tail-slow 3s ease-in-out infinite; transform-origin: left center; }
  @keyframes tail-slow { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(5deg)} }
  .dog-ear-l { animation: ear-twitch-l 4s ease-in-out infinite; transform-origin: bottom center; }
  @keyframes ear-twitch-l { 0%,90%,100%{transform:rotate(0deg)} 93%{transform:rotate(-8deg)} 96%{transform:rotate(2deg)} }
  .dog-ear-r { animation: ear-twitch-r 4.5s ease-in-out infinite; transform-origin: bottom center; }
  @keyframes ear-twitch-r { 0%,88%,100%{transform:rotate(0deg)} 91%{transform:rotate(8deg)} 94%{transform:rotate(-2deg)} }
  .dog-blink { animation: blink 4s ease-in-out infinite; }
  @keyframes blink { 0%,42%,48%,100%{transform:scaleY(1)} 45%{transform:scaleY(0.1)} }
  .zzz { animation: zzz-float 2.5s ease-in-out infinite; opacity: 0; }
  .zzz-1 { animation-delay: 0s; }
  .zzz-2 { animation-delay: 0.8s; }
  .zzz-3 { animation-delay: 1.6s; }
  @keyframes zzz-float { 0%{opacity:0;transform:translate(0,0) scale(0.6)} 20%{opacity:0.9} 80%{opacity:0.4} 100%{opacity:0;transform:translate(-12px,-20px) scale(1)} }
  .heart-float { animation: heart-pop 1.5s ease-out infinite; opacity: 0; }
  .heart-1 { animation-delay: 0s; }
  .heart-2 { animation-delay: 0.5s; }
  .heart-3 { animation-delay: 1s; }
  @keyframes heart-pop { 0%{opacity:0;transform:translate(0,0) scale(0.4)} 30%{opacity:1} 100%{opacity:0;transform:translate(var(--hx,-10px),var(--hy,-30px)) scale(1)} }
  .sparkle { animation: sparkle-spin 1.2s linear infinite; opacity: 0; }
  .sparkle-1 { animation-delay: 0s; }
  .sparkle-2 { animation-delay: 0.4s; }
  .sparkle-3 { animation-delay: 0.8s; }
  @keyframes sparkle-spin { 0%{opacity:0;transform:scale(0) rotate(0deg)} 30%{opacity:1;transform:scale(1) rotate(90deg)} 100%{opacity:0;transform:scale(0.5) rotate(180deg)} }
  .mascot-status { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-2); letter-spacing: 0.05em; }
  .mascot-today { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
  .mascot-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; }
  .mascot-bar-wrap { width: 180px; }
  .mascot-bar-bg { height: 4px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
  .mascot-bar-fill { height: 4px; background: var(--green); border-radius: 999px; transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1); }
  .mascot-milestones { display: flex; justify-content: space-between; width: 180px; margin-top: 4px; }
  .milestone { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-3); }
  .milestone.reached { color: var(--green); }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-left">
      <h1>MAY <span>CHALLENGE</span></h1>
      <p>PERSONAL HISTORY · MAY 2026</p>
    </div>
  </div>

  <div class="nav">
    <a href="/index.html">↑ Log workout</a>
    <a href="/dashboard.html">← Squad</a>
    <a href="#" class="active" id="nav-name">…</a>
  </div>

  <div id="mascot-section" style="display:none">
  <div class="mascot-section">
    <div class="mascot-label" id="mascot-date-label">TODAY</div>
    <div class="mascot-wrap">
      <div id="mascot-dog"></div>
      <svg class="crown-overlay" id="crown-overlay" width="48" height="36" viewBox="0 0 48 36" fill="none">
        <path d="M4 30 L8 12 L16 22 L24 6 L32 22 L40 12 L44 30 Z" fill="#FFD700" stroke="#cc8800" stroke-width="1.5" stroke-linejoin="round"/>
        <rect x="4" y="28" width="40" height="7" rx="2.5" fill="#FFD700" stroke="#cc8800" stroke-width="1.5"/>
        <circle cx="24" cy="8" r="3" fill="#e05555" stroke="#cc8800" stroke-width="1"/>
        <circle cx="8" cy="14" r="2.5" fill="#5B8DD9" stroke="#cc8800" stroke-width="1"/>
        <circle cx="40" cy="14" r="2.5" fill="#4ade80" stroke="#cc8800" stroke-width="1"/>
      </svg>
    </div>
    <div class="mascot-today"><span id="mascot-mins">0</span> min today</div>
    <div class="mascot-status" id="mascot-status">Log a workout to wake the dog up 😴</div>
    <div class="mascot-bar-wrap">
      <div class="mascot-bar-bg">
        <div class="mascot-bar-fill" id="mascot-bar" style="width:0%"></div>
      </div>
      <div class="mascot-milestones">
        <span class="milestone" id="m-30">30m 🐾</span>
        <span class="milestone" id="m-60">60m 😍</span>
        <span class="milestone" id="m-90">90m 👑</span>
      </div>
    </div>
  </div>
</div>
<div id="main-content">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Loading history...</p>
    </div>
  </div>
</div>

<!-- Confirm delete modal -->
<div class="modal-backdrop" id="confirm-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">Delete workout?</div>
    <div class="modal-body" id="confirm-body">…</div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn confirm" id="confirm-btn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://teyafvhzoznsjknhinrd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_BwZtfeVzUS_hoY-3L75T1w_CfFntJYM';
const GOAL_MINS = 250 * 60;
const MEMBERS = ['Ashka','Heli','Himani','Jigar','Karan','Kashyap','Khushboo','Malhar','Raghav','Vishrut'];
const COLORS = [
  ['#0d3d2c','#4ade80'],['#1a2a4a','#60a5fa'],['#3d2a0d','#fbbf24'],
  ['#3d0d2a','#f472b6'],['#1a3d1a','#86efac'],['#2a1a3d','#a78bfa'],
  ['#3d1a0d','#fb923c'],['#2a2a1a','#d4d4aa'],['#3d0d0d','#f87171'],['#0d2a3d','#38bdf8']
];
const ACT_ICONS = {Running:'🏃',Hiking:'🥾',Lifting:'🏋️',Cycling:'🚴',Walking:'🚶',HIIT:'💪',Swimming:'🏊',Yoga:'🧘',Volleyball:'🏐',Climbing:'🧗',Other:'⚡'};
const ACT_COLORS = ['#1D9E75','#5580e0','#e0a855','#e05555','#a855e0','#55e0c8','#e08055','#80e055','#e055c8','#5580e0','#e0a855'];

function getNameFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get('name');
}

async function fetchWorkouts(name) {
  const encoded = encodeURIComponent(name);
  const res = await fetch(`${SUPABASE_URL}/rest/v1/workouts?select=*&name=eq.${encoded}&order=date.desc,created_at.desc`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return res.json();
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function render(name, workouts) {
  const memberIdx = MEMBERS.indexOf(name);
  const color = COLORS[memberIdx] || COLORS[0];
  const initials = name.slice(0, 2).toUpperCase();
  const perPersonGoal = GOAL_MINS / MEMBERS.length;
  const savedName = localStorage.getItem('may-challenge-name');
  const isOwnPage = savedName === name;

  const totalMins = workouts.reduce((s, w) => s + w.mins, 0);
  const totalHrs = totalMins / 60;
  const pct = Math.min(100, (totalMins / perPersonGoal) * 100);
  const sessions = workouts.length;
  const avgMins = sessions > 0 ? Math.round(totalMins / sessions) : 0;
  const longestWorkout = sessions > 0 ? workouts.reduce((max, w) => w.mins > max.mins ? w : max, workouts[0]) : null;

  // Favorite activity
  const actCount = {};
  workouts.forEach(w => { actCount[w.activity] = (actCount[w.activity] || 0) + w.mins; });
  const favActivity = Object.entries(actCount).sort((a, b) => b[1] - a[1])[0];
  const actSorted = Object.entries(actCount).sort((a, b) => b[1] - a[1]);
  const maxActMins = actSorted[0]?.[1] || 1;

  // Update nav
  document.getElementById('nav-name').textContent = name;
  document.title = `May Challenge · ${name}`;

  document.getElementById('main-content').innerHTML = `
    <!-- HERO -->
    <div class="hero">
      <div class="hero-top">
        <div class="hero-avatar" style="background:${color[0]};color:${color[1]}">${initials}</div>
        <div class="hero-name">${name}</div>
      </div>
      <div class="hero-nums">
        <div class="hero-current">${totalHrs.toFixed(1)}</div>
        <div class="hero-unit">hrs</div>
        <div class="hero-slash">/</div>
        <div class="hero-goal">${(perPersonGoal/60).toFixed(0)}</div>
      </div>
      <div class="hero-bar-bg">
        <div class="hero-bar-fill" style="width:${pct}%"></div>
      </div>
      <div class="hero-meta">
        <div class="hero-meta-item">
          <span class="hero-meta-label">Progress</span>
          <span class="hero-meta-val green">${pct.toFixed(0)}%</span>
        </div>
        <div class="hero-meta-item">
          <span class="hero-meta-label">Sessions</span>
          <span class="hero-meta-val">${sessions}</span>
        </div>
        <div class="hero-meta-item">
          <span class="hero-meta-label">Avg session</span>
          <span class="hero-meta-val">${avgMins}m</span>
        </div>
        ${favActivity ? `
        <div class="hero-meta-item">
          <span class="hero-meta-label">Top activity</span>
          <span class="hero-meta-val">${ACT_ICONS[favActivity[0]] || '⚡'} ${favActivity[0]}</span>
        </div>` : ''}
        ${longestWorkout ? `
        <div class="hero-meta-item">
          <span class="hero-meta-label">Longest</span>
          <span class="hero-meta-val">${longestWorkout.mins}m</span>
        </div>` : ''}
      </div>
    </div>

    ${sessions === 0 ? `
      <div class="error-state">
        <p>No workouts logged yet.<br><a href="/index.html">Log your first workout →</a></p>
      </div>
    ` : `
      <!-- ACTIVITY BREAKDOWN + STATS -->
      <div class="two-col">
        <div class="card">
          <div class="card-title">By activity</div>
          ${actSorted.map(([act, mins], i) => `
            <div class="activity-row">
              <div class="activity-icon">${ACT_ICONS[act] || '⚡'}</div>
              <div class="activity-name">${act}</div>
              <div class="activity-bar-wrap">
                <div class="activity-bar-bg">
                  <div class="activity-bar-fill" style="width:${(mins/maxActMins)*100}%;background:${ACT_COLORS[i % ACT_COLORS.length]}"></div>
                </div>
              </div>
              <div class="activity-hrs">${(mins/60).toFixed(1)}h</div>
            </div>
          `).join('')}
        </div>

        <div class="stats-grid" style="display:flex;flex-direction:column;gap:12px">
          <div class="stat-card">
            <div class="stat-label">Total hours</div>
            <div class="stat-val">${totalHrs.toFixed(1)}</div>
            <div class="stat-sub">of ${(perPersonGoal/60).toFixed(0)}h personal goal</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Sessions</div>
            <div class="stat-val">${sessions}</div>
            <div class="stat-sub">${avgMins} min avg duration</div>
          </div>
          ${longestWorkout ? `
          <div class="stat-card">
            <div class="stat-label">Longest session</div>
            <div class="stat-val">${longestWorkout.mins}m</div>
            <div class="stat-sub">${ACT_ICONS[longestWorkout.activity] || '⚡'} ${longestWorkout.activity}</div>
          </div>` : ''}
        </div>
      </div>

      <!-- WORKOUT LIST -->
      <div class="card">
        <div class="card-title">All workouts · ${sessions} total${isOwnPage ? ' · tap ✕ to delete' : ''}</div>
        ${workouts.map(w => `
          <div class="workout-row" data-workout-id="${w.id}">
            <div class="workout-icon">${ACT_ICONS[w.activity] || '⚡'}</div>
            <div class="workout-info">
              <div class="workout-activity">${w.activity}</div>
              <div class="workout-date">${formatDate(w.date)}</div>
            </div>
            <div class="workout-mins">${w.mins}m</div>
            ${isOwnPage ? `<button class="workout-delete" onclick="askDelete(${w.id}, '${w.activity}', ${w.mins}, '${w.date}')" aria-label="Delete workout">✕</button>` : ''}
          </div>
        `).join('')}
      </div>
    `}
  `;
}

// Delete flow
let pendingDelete = null;

function askDelete(id, activity, mins, date) {
  pendingDelete = { id, activity, mins, date };
  const d = new Date(date + 'T12:00:00');
  const dateLabel = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  document.getElementById('confirm-body').innerHTML =
    `Delete <strong>${mins}m of ${activity}</strong> on ${dateLabel}? This can't be undone.`;
  document.getElementById('confirm-btn').disabled = false;
  document.getElementById('confirm-btn').textContent = 'Delete';
  document.getElementById('confirm-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('confirm-modal').classList.remove('show');
  pendingDelete = null;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

async function confirmDelete() {
  if (!pendingDelete) return;
  const { id } = pendingDelete;
  const name = getNameFromURL();
  const btn = document.getElementById('confirm-btn');
  btn.disabled = true;
  btn.textContent = 'Deleting…';
  try {
    const res = await fetch('/api/delete', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, name })
    });
    const data = await res.json();
    if (res.ok && data.success) {
      // Optimistically remove the row from the DOM, then re-fetch to refresh stats
      const row = document.querySelector(`[data-workout-id="${id}"]`);
      if (row) row.style.transition = 'opacity 0.2s'; if (row) row.style.opacity = '0';
      closeModal();
      showToast('Workout deleted');
      // Re-fetch and re-render so the hero stats and activity breakdown stay accurate
      fetchWorkouts(name).then(workouts => render(name, workouts));
    } else {
      btn.disabled = false;
      btn.textContent = 'Delete';
      showToast(data.error || 'Delete failed');
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Delete';
    showToast('Network error — try again');
  }
}

    ? `<g class="heart-float heart-1" style="--hx:-15px;--hy:-25px;transform-origin:55px 50px"><path d="M55 50 Q58 45 61 50 Q64 45 67 50 Q67 56 61 61 Q55 56 55 50Z" fill="#FF6B9D" opacity="0.8"/></g>
       <g class="heart-float heart-2" style="--hx:20px;--hy:-30px;transform-origin:95px 45px"><path d="M95 45 Q98 40 101 45 Q104 40 107 45 Q107 51 101 56 Q95 51 95 45Z" fill="#FF6B9D" opacity="0.8"/></g>
       <g class="heart-float heart-3" style="--hx:5px;--hy:-35px;transform-origin:75px 40px"><path d="M75 40 Q77 37 79 40 Q81 37 83 40 Q83 44 79 47 Q75 44 75 40Z" fill="#FF6B9D" opacity="0.8"/></g>`

      <!-- tail -->

}

function initMascot(todayMins) {
  const section = document.getElementById('mascot-section');
  section.style.display = 'block';

  document.getElementById('mascot-mins').textContent = todayMins;

  const pct = Math.min(100, (todayMins / 90) * 100);
  document.getElementById('mascot-bar').style.width = pct + '%';

  if (todayMins >= 30) document.getElementById('m-30').classList.add('reached');
  if (todayMins >= 60) document.getElementById('m-60').classList.add('reached');
  if (todayMins >= 90) document.getElementById('m-90').classList.add('reached');

  let state, statusMsg, showCrown = false;
  if (todayMins === 0) {
    state = 'sleep';
    statusMsg = 'Log a workout to wake the dog up 😴';
  } else if (todayMins < 60) {
    state = 'happy';
    statusMsg = todayMins < 30 ? 'Good start! Keep going 🐾' : 'Getting there! 30 more for heart eyes 💪';
  } else if (todayMins < 90) {
    state = 'love';
    statusMsg = 'Crushing it today! 😍 30 more for the crown 👑';
  } else {
    state = 'love';
    statusMsg = 'LEGENDARY day. Crown earned. 👑✨';
    showCrown = true;
  }

  document.getElementById('mascot-status').textContent = statusMsg;
  document.getElementById('crown-overlay').classList.toggle('show', showCrown);
  document.getElementById('mascot-dog').innerHTML = dogSVG(state);

  const today = new Date();
  document.getElementById('mascot-date-label').textContent =
    today.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' }).toUpperCase();
}

function getTodayMins(workouts) {
  const tz = 'America/Los_Angeles';
  const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: tz });
  return workouts
    .filter(w => {
      const wDate = w.created_at
        ? new Date(w.created_at).toLocaleDateString('en-CA', { timeZone: tz })
        : w.date;
      return wDate === todayStr;
    })
    .reduce((s, w) => s + w.mins, 0);
}

// Init
const name = getNameFromURL();
if (!name || !MEMBERS.includes(name)) {
  document.getElementById('main-content').innerHTML = `
    <div class="error-state">
      <p>Member not found. <a href="/dashboard.html">← Back to dashboard</a></p>
    </div>
  `;
} else {
  fetchWorkouts(name).then(workouts => {
  render(name, workouts);
  initMascot(getTodayMins(workouts));
}).catch(e => {
    document.getElementById('main-content').innerHTML = `
      <div class="error-state">
        <p>Failed to load data. <a href="/dashboard.html">← Back to dashboard</a></p>
      </div>
    `;
    console.error(e);
  });
}
